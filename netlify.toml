[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/zk/generate-compliance-proof"
  to = "/.netlify/functions/generate-compliance-proof"
  status = 200

[[redirects]]
  from = "/api/zk/generate-rental-trust-proof"
  to = "/.netlify/functions/generate-rental-trust-proof"
  status = 200

[[redirects]]
  from = "/api/zk/verify-proof"
  to = "/.netlify/functions/verify-proof"
  status = 200

[[redirects]]
  from = "/api/zk/generate-airdrop-eligibility-proof"
  to = "/.netlify/functions/generate-airdrop-eligibility-proof"
  status = 200

[[redirects]]
  from = "/api/zk/generate-royalty-compliance-proof"
  to = "/.netlify/functions/generate-royalty-compliance-proof"
  status = 200

[[redirects]]
  from = "/api/zk/generate-governance-power-proof"
  to = "/.netlify/functions/generate-governance-power-proof"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = "dist"
  autoLaunch = false
